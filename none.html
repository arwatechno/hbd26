<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday 1 </title>
</head>
<style>
    body {
  background-image: url('download.png');
  background-repeat: no-repeat;  
  background-size:cover;      
  background-attachment: fixed; 
  background-position: center;  
   
}
h1 {
    font-family: 'Pacifico', cursive;
    color: #fffbc1;
    font-size: 70px;
    margin-bottom: 2rem;
    text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
}
div{
    margin-top: 50%;
    display: grid;
  justify-content: center;
}

.button-85 {
  padding: 0.6em 2em;
  border: none;
  outline: none;
  color: rgb(255, 255, 255);
  background: #111;
  cursor: pointer;
  position: relative;
  z-index: 0;
  border-radius: 10px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  width: 50%;
  margin-left: 20%;
}

.button-85:before {
  content: "";
  background: linear-gradient(
    45deg,
    #ff7300,
    #fffb00,
    #7a00ff,
    #ff00c8,
    #ff0000
  );
  position: absolute;
  top: -2px;
  left: -2px;
  background-size: 400%;
  z-index: -1;
  filter: blur(5px);
  -webkit-filter: blur(5px);
  width: calc(100% + 4px);
  height: calc(100% + 4px);
  animation: glowing-button-85 20s linear infinite;
  transition: opacity 0.3s ease-in-out;
  border-radius: 10px;
}

@keyframes glowing-button-85 {
  0% {
    background-position: 0 0;
  }
  50% {
    background-position: 400% 0;
  }
  100% {
    background-position: 0 0;
  }
}

.button-85:after {
  z-index: -1;
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #222;
  left: 0;
  top: 0;
  border-radius: 10px;
}
</style>
<body>
    <div>
    <h1>Happy Birthday Mr.Ahmed</h1>
    <a href='solve.html' >
<button   class="button-85" role="button">let's party</button> </a>
    </div>
</body>
</html>
